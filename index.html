<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Football Manager: Team 11 — Download</title>
  <meta name="description" content="Draft your dream XI and win the tournament. Download Football Manager: Team 11 free on iOS and Android." />

  <!-- Open Graph: nice preview card when shared on Facebook -->
  <meta property="og:title" content="Football Manager: Team 11" />
  <meta property="og:description" content="Draft your dream XI and win the tournament. Play free on iOS & Android." />
  <meta property="og:type" content="website" />

  <!-- Instant store redirect: runs before the page renders, so phones go
       straight to the right store with no visible "choose" page. -->
  <script>
    (function () {
      var IOS = "https://apps.apple.com/app/id6779756457";
      var ANDROID = "https://play.google.com/store/apps/details?id=io.userwise.soccer.squadmanager";
      var ua = navigator.userAgent || navigator.vendor || window.opera || "";
      var isAndroid = /android/i.test(ua);
      // iPad on iOS 13+ reports as Mac, so also check for touch
      var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                  (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1);
      if (isAndroid) window.location.replace(ANDROID);
      else if (isIOS) window.location.replace(IOS);
      // Desktop / unknown: fall through and show both buttons below.
    })();
  </script>

  <style>
    :root {
      --bg: #0b1f17;
      --bg2: #0e2a1e;
      --accent: #2ecc71;
      --accent2: #27ae60;
      --text: #eafff4;
      --muted: #9fc7b3;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(120% 120% at 50% 0%, var(--bg2) 0%, var(--bg) 60%, #06140e 100%);
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 28px;
      backdrop-filter: blur(8px);
    }
    .badge {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 28px;
      line-height: 1.2;
      margin: 0 0 10px;
      font-weight: 800;
    }
    p.sub {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
      margin: 0 0 28px;
    }
    .pitch {
      font-size: 56px;
      margin-bottom: 14px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 20px;
      margin: 10px 0;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid var(--border);
      transition: transform .08s ease, opacity .2s ease;
    }
    .btn:active { transform: scale(0.98); }
    .btn-ios { background: #ffffff; color: #0b1f17; }
    .btn-android {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #06140e;
    }
    .note {
      margin-top: 22px;
      font-size: 13px;
      color: var(--muted);
    }
    .spinner {
      width: 22px; height: 22px;
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="pitch">⚽️</div>
    <div class="badge">Free to play</div>
    <h1>Football Manager:<br>Team 11</h1>
    <p class="sub">Draft your dream XI and win the tournament.</p>

    <div class="spinner" id="spinner"></div>

    <a class="btn btn-ios" id="ios" href="https://apps.apple.com/app/id6779756457">
       Download on the App Store</a>
    <a class="btn btn-android" id="android" href="https://play.google.com/store/apps/details?id=io.userwise.soccer.squadmanager">
       Get it on Google Play</a>

    <div class="note">You'll be sent to the right store automatically.</div>
  </div>
</body>
</html>
